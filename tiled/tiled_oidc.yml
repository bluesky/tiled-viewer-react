# Must set environment variables ORCID_CLIENT_ID and ORCID_CLIENT_SECRET to run.

database:
  uri: sqlite:///./tiled_sessions_oidc.db  # Create in current directory for testing
  init_if_not_exists: true

authentication:
  providers:
  - provider: orcid
    authenticator: tiled.authenticators:OIDCAuthenticator
    args:
      audience: ${ORCID_CLIENT_ID}  # something unique to ensure received headers are for you
      # These values come from https://orcid.org/developer-tools
      client_id: ${ORCID_CLIENT_ID}
      client_secret: ${ORCID_CLIENT_SECRET}
      well_known_uri: https://orcid.org/.well-known/openid-configuration
      confirmation_message: "You have logged in with ORCID as {id}."
      redirect_on_success: https://seijdeleon.github.io/redirect/
      redirect_on_failure: http://localhost:8000/docs
trees:
 # Just some arbitrary example data...
 # The point of this example is the authentication above.
  - tree: tiled.examples.generated_minimal:tree
    path: /

allow_origins:
  - http://localhost:5173
  - http://localhost:5174

uvicorn:
  host: tiled.localhost