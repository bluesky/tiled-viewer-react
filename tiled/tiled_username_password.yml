# Must set environment variables ORCID_CLIENT_ID and ORCID_CLIENT_SECRET to run.

database:
  uri: sqlite:///./tiled_sessions.db  # Create in current directory for testing
  init_if_not_exists: true

authentication:
  providers:
  - provider: username_password
    authenticator: tiled.authenticators:DictionaryAuthenticator
    args:
      users_to_passwords:
        alice: ${ALICE_PASSWORD}
        bob: ${BOB_PASSWORD}
        cara: ${CARA_PASSWORD}
trees:
 # Just some arbitrary example data...
 # The point of this example is the authentication above.
  - tree: tiled.examples.generated_minimal:tree
    path: /

allow_origins:
  - http://localhost:5173
  - http://localhost:5174

uvicorn:
  host: localhost