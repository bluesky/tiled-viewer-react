name: Publish package on npm

on:
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - run: npm ci
      - run: npm run lint --if-present
      - run: npm test --if-present
      - run: npm run build --if-present

      # Optional: verifies what would be published
      - run: npm pack --dry-run

      # Upload build artifacts for the publish job
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  publish:
    needs: [dist]
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write
      contents: read
    if: github.event_name == 'release' && github.event.action == 'published'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.10.0
          registry-url: https://registry.npmjs.org/

      # Download the built artifacts
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - run: npm ci

      # Needed for npm trusted publishing support, using latest gives error so pin a recent version
      - run: npm install -g npm@11.6.2

      - run: npm publish --access public --provenance